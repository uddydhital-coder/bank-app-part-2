<!DOCTYPE html>
<html>
<head>
    <title>Bank App Part 2</title>
</head>
<body>

    <h1>Bank App</h1>

    <label>Income:</label>
    <input type="number" id="income"><br><br>

    <label>Expense:</label>
    <input type="number" id="expense"><br><br>

    <button onclick="checkBalance()">Check Balance</button>

    <h2 id="result"></h2>

    <script>
        function checkBalance() {
            let income = Number(document.getElementById("income").value);
            let expense = Number(document.getElementById("expense").value);

            let balance = income - expense;

            if (balance > 0) {
                document.getElementById("result").innerHTML =
                    "Balance: $" + balance + "<br>You have money left over.";
            } else if (balance === 0) {
                document.getElementById("result").innerHTML =
                    "Balance: $0<br>You broke even.";
            } else {
                document.getElementById("result").innerHTML =
                    "Balance: $" + balance + "<br>You spent more than you earned.";
            }
        }
    </script>

</body>
</html>
